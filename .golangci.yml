version: "2"

issues:
  max-same-issues: 50

formatters:
  enable: [goimports, golines, gofumpt]

  settings:
    goimports:
      local-prefixes:
        - github.com/pyrorhythm/sut-practice

    golines:
      max-len: 100
      chain-split-dots: true
      shorten-comments: true
      tab-len: 4

linters:
  enable:
  - bidichk
  - embeddedstructfieldcheck
  - errcheck
  - errname
  - errorlint
  - exhaustive
  - fatcontext
  - funcorder
  - funlen
  - gocheckcompilerdirectives
  - gochecksumtype
  - gocognit
  - goconst
  - gocritic
  - gosec
  - iface
  - ineffassign
  - intrange
  - importas
  - iotamixing
  - mirror
  - modernize
  - nakedret
  - nestif
  - nilerr
  - nilnesserr
  - nilnil
  - noctx
  - nosprintfhostport
  - perfsprint
  - predeclared
  - reassign
  - recvcheck
  - revive
  - spancheck
  - sqlclosecheck
  - staticcheck
  - testifylint
  - testpackage
  - unconvert
  - unparam

  settings:
    cyclop:
      max-complexity: 30
      package-average: 10.0

    embeddedstructfieldcheck:
      forbid-mutex: true

    errcheck:
      check-type-assertions: true

    exhaustive:
      check:
        - switch
        - map

    funcorder:
      struct-method: false

    funlen:
      lines: 100
      statements: 50

    gochecksumtype:
      default-signifies-exhaustive: false

    gocognit:
      min-complexity: 20

    gocritic:
      settings:
        captLocal:
          paramsOnly: false
        underef:
          skipRecvDeref: false

    nakedret:
      max-func-lines: 0

    nolintlint:
      allow-no-explanation: [funlen, gocognit, golines]
      require-explanation: true
      require-specific: true

    perfsprint:
      strconcat: false

    reassign:
      patterns:
        - ".*"

    rowserrcheck:
      packages:
        - github.com/jmoiron/sqlx

    staticcheck:
      checks:
        - all
        - -ST1000
        - -ST1001
        - -ST1016
        - -QF1008

    revive:
      enable-all-rules: false
      enable-default-rules: false
      rules:
        - name: "dot-imports"
          disabled: true
#
#    custom:
#      nilaway:
#        type: module
#        description: Static analysis tool to detect potential nil panics in Go code.
#        settings:
#          # Settings must be a "map from string to string" to mimic command line flags: the keys are
#          # flag names and the values are the values to the particular flags.
#          include-pkgs: "github.com/pyrorhythm"
#  #      rules:
#  #        - name: "indent-error-flow"
#  #          disabled: true

  exclusions:
    warn-unused: true
    presets:
      - std-error-handling
      - common-false-positives
    rules:
      - source: "TODO"
        linters: [godot]
      - text: "should have a package comment"
        linters: [revive]
      - text: 'exported \S+ \S+ should have comment( \(or a comment on this block\))? or be unexported'
        linters: [revive]
      - text: 'package comment should be of the form ".+"'
        source: "// ?(nolint|TODO)"
        linters: [revive]
      - text: 'comment on exported \S+ \S+ should be of the form ".+"'
        source: "// ?(nolint|TODO)"
        linters: [revive, staticcheck]
      - path: '_test\.go'
        linters:
          - bodyclose
          - dupl
          - errcheck
          - funlen
          - goconst
          - gosec
          - noctx
          - wrapcheck
